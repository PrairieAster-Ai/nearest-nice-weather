# Comprehensive CI/CD Pipeline
# Nearest Nice Weather - Weather Intelligence Platform
# Consolidated: Security + Quality + Deployment for team development

name: 'Comprehensive CI/CD'

on:
  push:
    branches: [ main, develop, preview, feature/* ]
  pull_request:
    branches: [ main, develop, preview ]
  workflow_dispatch: # Allow manual triggers

# Environment variables
env:
  NODE_VERSION: '20'  # LTS version for team consistency

jobs:
  # Stage 1: Security & Quality Gates - Fast feedback for developers
  security-and-quality:
    name: 'Security & Quality Gates'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - name: 'Checkout Code'
      uses: actions/checkout@v7
      with:
        fetch-depth: 0 # Full history for security scanning

    - name: 'Setup Node.js'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 'Install Dependencies'
      run: npm ci

    # Security: Secret scanning with TruffleHog OSS
    - name: 'TruffleHog Secret Scanning'
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || 'HEAD~1' }}
        head: HEAD
        extra_args: --debug --only-verified
      continue-on-error: true

    # Quality: Linting
    - name: 'Lint Check'
      run: |
        cd apps/web && npm run lint

    # Quality: Type checking
    - name: 'Type Check'
      run: |
        cd apps/web && npm run type-check

    # Quality: No circular imports (madge gate)
    - name: 'Circular Imports Gate'
      run: npm run lint:circular

    # Quality: 100% TSDoc on exported declarations (doc-coverage gate)
    - name: 'Doc Coverage Gate'
      run: npm run docs:gate

    # Security: Dependency audit
    - name: 'Security Audit'
      run: |
        npm audit --audit-level moderate || true
        echo "Security audit completed (non-blocking for development)"

    # Quality: Build test
    - name: 'Build Validation'
      run: |
        cd apps/web && npm run build

  # Stage 2: Advanced Security Analysis (parallel with quality gates)
  advanced-security:
    name: 'Advanced Security Analysis'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
    - name: 'Checkout Code'
      uses: actions/checkout@v7

    - name: 'Setup Node.js'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 'Install Dependencies'
      run: npm ci

    # Security: CodeQL analysis
    - name: 'Initialize CodeQL'
      uses: github/codeql-action/init@v4
      with:
        languages: javascript,typescript
        config-file: ./.github/codeql/codeql-config.yml
      continue-on-error: true

    - name: 'Build for CodeQL Analysis'
      run: |
        cd apps/web && npm run build || true  # Allow build failures for security scanning

    - name: 'Perform CodeQL Analysis'
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:javascript"
      continue-on-error: true

  # Stage 3: Unit Tests (CQ-2: Test Coverage)
  unit-tests:
    name: 'Unit Tests'
    runs-on: ubuntu-latest
    needs: [security-and-quality]
    timeout-minutes: 10

    steps:
    - name: 'Checkout Code'
      uses: actions/checkout@v7

    - name: 'Setup Node.js'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 'Install Dependencies'
      run: npm ci

    - name: 'Run Unit Tests'
      run: |
        npm run test:unit

    - name: 'Generate Coverage Report'
      run: |
        npm run test:unit:coverage
      continue-on-error: true

    - name: 'Upload Coverage Report'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: coverage/
        retention-days: 30
      if: always()
